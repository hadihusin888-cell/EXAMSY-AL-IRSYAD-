
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#4f46e5">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Examsy - Modern Exam Platform</title>
    
    <link rel="manifest" href="/manifest.json">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root { font-display: swap; }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
            -webkit-tap-highlight-color: transparent;
            text-rendering: optimizeLegibility;
            -webkit-font-smoothing: antialiased;
            overscroll-behavior-y: contain;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .animate-gpu {
            will-change: transform, opacity;
            transform: translateZ(0);
        }
    </style>
    <script>
        window.appLoaded = false;
        window.onerror = function(msg, url, lineNo, columnNo, error) {
            var message = [
                'Message: ' + msg,
                'URL: ' + url,
                'Line: ' + lineNo,
                'Column: ' + columnNo,
                'Error object: ' + JSON.stringify(error)
            ].join(' - ');
            console.error(message);
            
            // If a script fails to load, it might be a cache issue
            if (msg.indexOf('Script error') > -1 || msg.indexOf('Loading chunk') > -1) {
                console.warn("Possible cache corruption detected. Please clear cache.");
            }
            return false;
        };

        function clearAppCache() {
            localStorage.clear();
            sessionStorage.clear();
            if ('caches' in window) {
                caches.keys().then(names => {
                    for (let name of names) caches.delete(name);
                });
            }
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.getRegistrations().then(registrations => {
                    for (let registration of registrations) registration.unregister();
                });
            }
            window.location.reload(true);
        }

        // Auto-recovery: If app doesn't load in 10 seconds, show a help message
        setTimeout(function() {
            if (!window.appLoaded) {
                var helpEl = document.getElementById('loading-help');
                if (helpEl) helpEl.style.display = 'block';
            }
        }, 10000);
    </script>
</head>
<body>
    <div id="root">
        <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: sans-serif; color: #64748b; padding: 20px; text-align: center;">
            <div style="width: 40px; height: 40px; border: 4px solid #e2e8f0; border-top-color: #4f46e5; border-radius: 50%; animation: spin 1s linear infinite;"></div>
            <p style="margin-top: 16px; font-weight: 600;">Memuat Examsy...</p>
            
            <div id="loading-help" style="display: none; margin-top: 20px; animate-in fade-in duration-500;">
                <p style="font-size: 14px; color: #ef4444; font-weight: bold;">Gagal memuat aplikasi?</p>
                <p style="font-size: 12px; max-width: 300px; opacity: 0.8; margin: 10px auto; line-height: 1.6;">
                    Hal ini biasanya terjadi karena data lama yang tersimpan di browser Anda bermasalah.
                </p>
                <button onclick="clearAppCache()" style="background: #4f46e5; color: white; border: none; padding: 10px 20px; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 12px; box-shadow: 0 4px 6px -1px rgba(79, 70, 229, 0.2);">
                    Bersihkan Data & Muat Ulang
                </button>
            </div>

            <p style="margin-top: 30px; font-size: 11px; max-width: 300px; opacity: 0.6; line-height: 1.6; border-top: 1px solid #e2e8f0; pt-4;">
                Gunakan <b>Chrome, Edge,</b> atau <b>Firefox</b> terbaru.<br>
                Pastikan <b>Android System WebView</b> sudah di-update.
            </p>
        </div>
    </div>
    <style>
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
    <noscript>
        <div style="padding: 20px; text-align: center; font-family: sans-serif;">
            <h2>Browser Tidak Mendukung</h2>
            <p>Aplikasi ini memerlukan JavaScript untuk berjalan. Silakan aktifkan JavaScript atau gunakan browser yang lebih modern.</p>
        </div>
    </noscript>
    <script type="module" src="/index.tsx"></script>
</body>
</html>
